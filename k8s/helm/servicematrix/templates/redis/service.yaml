apiVersion: v1
kind: Service
metadata:
  name: {{ include "servicematrix.fullname" . }}-redis
  namespace: {{ include "servicematrix.namespace" . }}
  labels:
    {{- include "servicematrix.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "servicematrix.selectorLabels" (dict "root" . "component" "redis") | nindent 4 }}
