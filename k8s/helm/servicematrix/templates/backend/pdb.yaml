{{- if gt (int .Values.backend.replicaCount) 1 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "servicematrix.fullname" . }}-backend
  namespace: {{ include "servicematrix.namespace" . }}
  labels:
    {{- include "servicematrix.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "servicematrix.selectorLabels" (dict "root" . "component" "backend") | nindent 6 }}
{{- end }}
