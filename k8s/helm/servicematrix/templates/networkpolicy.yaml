{{- if .Values.networkPolicy.enabled }}
# Backend: APIサーバーへのインバウンドを Ingress + Postgres/Redis からのみ許可
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "servicematrix.fullname" . }}-backend
  namespace: {{ include "servicematrix.namespace" . }}
  labels:
    {{- include "servicematrix.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  podSelector:
    matchLabels:
      {{- include "servicematrix.selectorLabels" (dict "root" . "component" "backend") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Ingress Controller からの HTTP
    - ports:
        - port: 8000
          protocol: TCP
  egress:
    # PostgreSQL
    - ports:
        - port: 5432
          protocol: TCP
    # Redis
    - ports:
        - port: 6379
          protocol: TCP
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # 外部 HTTPS（OAuth/OIDC IdP など）
    - ports:
        - port: 443
          protocol: TCP
---
# Frontend: Ingress からのみ受け付け、Backend への Egress のみ許可
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "servicematrix.fullname" . }}-frontend
  namespace: {{ include "servicematrix.namespace" . }}
  labels:
    {{- include "servicematrix.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  podSelector:
    matchLabels:
      {{- include "servicematrix.selectorLabels" (dict "root" . "component" "frontend") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 3000
          protocol: TCP
  egress:
    - ports:
        - port: 8000
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
