apiVersion: v1
kind: Service
metadata:
  name: {{ include "servicematrix.fullname" . }}-frontend
  namespace: {{ include "servicematrix.namespace" . }}
  labels:
    {{- include "servicematrix.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "servicematrix.selectorLabels" (dict "root" . "component" "frontend") | nindent 4 }}
