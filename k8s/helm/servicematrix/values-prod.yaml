# Production overrides — set actual secrets via --set or external secret management
global:
  namespace: servicematrix
  imageRegistry: "your-registry.example.com/"

backend:
  image:
    tag: "0.7.0"
    pullPolicy: Always
  replicaCount: 3
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  autoscaling:
    minReplicas: 3
    maxReplicas: 20

frontend:
  image:
    tag: "0.7.0"
    pullPolicy: Always
  replicaCount: 3

postgres:
  image: postgres:16-alpine
  storage: 50Gi
  storageClassName: "standard"

ingress:
  host: servicematrix.your-domain.com
  tls: true
  tlsSecretName: servicematrix-tls-prod
