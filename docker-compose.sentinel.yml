version: '3.8'
# Redis Sentinel HA構成サンプル (開発・ステージング用)
# 使用方法: docker compose -f docker-compose.sentinel.yml up -d
services:
  redis-master:
    image: redis:7-alpine
    command: redis-server --port 6379
    ports:
      - "6379:6379"

  redis-replica-1:
    image: redis:7-alpine
    command: redis-server --port 6380 --replicaof redis-master 6379
    depends_on:
      - redis-master

  redis-replica-2:
    image: redis:7-alpine
    command: redis-server --port 6381 --replicaof redis-master 6379
    depends_on:
      - redis-master

  redis-sentinel-1:
    image: redis:7-alpine
    command: >
      redis-sentinel /etc/sentinel.conf
    volumes:
      - ./docker/redis/sentinel.conf:/etc/sentinel.conf
    depends_on:
      - redis-master
    ports:
      - "26379:26379"

  redis-sentinel-2:
    image: redis:7-alpine
    command: redis-sentinel /etc/sentinel.conf
    volumes:
      - ./docker/redis/sentinel.conf:/etc/sentinel.conf
    depends_on:
      - redis-master
    ports:
      - "26380:26379"

  redis-sentinel-3:
    image: redis:7-alpine
    command: redis-sentinel /etc/sentinel.conf
    volumes:
      - ./docker/redis/sentinel.conf:/etc/sentinel.conf
    depends_on:
      - redis-master
    ports:
      - "26381:26379"
