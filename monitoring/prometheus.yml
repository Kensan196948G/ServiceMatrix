global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: "development"
    app: "servicematrix"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # ServiceMatrix バックエンド API
  - job_name: "servicematrix"
    static_configs:
      - targets: ["app:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  # Prometheus 自己監視
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
