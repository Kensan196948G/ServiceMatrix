name: SDK Auto Update

on:
  push:
    branches:
      - main
    paths:
      - 'src/**/*.py'
      - 'src/schemas/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-sdk:
    name: Update TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: pip install -e ".[dev]"

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Start FastAPI server
        run: |
          uvicorn src.main:app --host 0.0.0.0 --port 8000 &
          for i in {1..30}; do
            curl -sf http://localhost:8000/api/v1/health && break
            sleep 2
          done
        env:
          ENVIRONMENT: test

      - name: Generate TypeScript SDK
        # Uses openapi-typescript (via npx) to generate TypeScript type definitions
        run: |
          chmod +x scripts/generate_sdk.sh
          ./scripts/generate_sdk.sh
        env:
          OPENAPI_URL: http://localhost:8000/openapi.json

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet sdk/typescript/schema.d.ts 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR if SDK changed
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(sdk): auto-update TypeScript SDK from OpenAPI schema'
          title: 'chore(sdk): Auto-update TypeScript SDK'
          body: |
            ## 自動更新

            OpenAPI スキーマの変更を検知したため TypeScript SDK を自動更新しました。

            🤖 Generated by SDK Auto Update workflow
          branch: chore/sdk-auto-update
          delete-branch: true
