name: ServiceMatrix CI

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'docs/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────
  # Job 1: Markdown Lint
  # ─────────────────────────────────────────────────
  lint-markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Run Markdown Lint
        run: markdownlint-cli2 "**/*.md" --config .markdownlint.json || true

  # ─────────────────────────────────────────────────
  # Job 2: Docs Structure Validation
  # ─────────────────────────────────────────────────
  validate-docs-structure:
    name: Validate Docs Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Required Documents Exist
        run: |
          echo "🔍 必須ドキュメント存在確認..."
          MISSING=0

          required_docs=(
            "docs/00_foundation/SERVICEMATRIX_CHARTER.md"
            "docs/01_governance/GOVERNANCE_MODEL.md"
            "docs/02_architecture/SYSTEM_ARCHITECTURE_OVERVIEW.md"
            "docs/03_process/INCIDENT_MANAGEMENT_MODEL.md"
            "docs/03_process/CHANGE_MANAGEMENT_MODEL.md"
            "docs/04_agents_ai/AI_GOVERNANCE_POLICY.md"
            "docs/05_devops/BRANCH_STRATEGY.md"
            "docs/05_devops/PULL_REQUEST_POLICY.md"
            "docs/06_security_compliance/ACCESS_CONTROL_MODEL.md"
            "docs/07_sla_metrics/SLA_DEFINITION.md"
          )

          for doc in "${required_docs[@]}"; do
            if [ ! -f "$doc" ]; then
              echo "❌ 必須ドキュメントが見つかりません: $doc"
              MISSING=$((MISSING + 1))
            else
              echo "✅ $doc"
            fi
          done

          if [ $MISSING -gt 0 ]; then
            echo "⚠️  $MISSING 件の必須ドキュメントが不足しています"
            exit 1
          fi
          echo "✅ 全必須ドキュメント確認完了"

  # ─────────────────────────────────────────────────
  # Job 3: YAML/JSON Validation
  # ─────────────────────────────────────────────────
  validate-config-files:
    name: Validate Config Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GitHub Actions Workflows
        run: |
          echo "🔍 GitHub Actions ワークフロー構文確認..."
          for f in .github/workflows/*.yml; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" && echo "✅ $f" || echo "❌ $f"
          done

  # ─────────────────────────────────────────────────
  # Job 4: Security Scan
  # ─────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for Secrets (Push)
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified
        continue-on-error: true

      - name: Scan for Secrets (PR)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.sha }}
          extra_args: --only-verified
        continue-on-error: true

  # ─────────────────────────────────────────────────
  # Job 6: Python Lint (ruff)
  # ─────────────────────────────────────────────────
  python-lint:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/ || true

  # ─────────────────────────────────────────────────
  # Job 7: Python Tests (pytest)
  # ─────────────────────────────────────────────────
  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install fastapi "uvicorn[standard]" "sqlalchemy[asyncio]" alembic \
            pydantic "pydantic-settings" \
            "python-jose[cryptography]" "passlib[bcrypt]" \
            httpx redis structlog apscheduler \
            pytest pytest-asyncio pytest-cov anyio "anyio[trio]" \
            aiosqlite python-multipart

      - name: Run tests with coverage
        run: |
          pytest tests/ --asyncio-mode=auto --tb=short \
            --cov=src --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=75

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # ─────────────────────────────────────────────────
  # Job: Frontend Build (Next.js)
  # ─────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Type check
        run: cd frontend && npm run type-check
      - name: Build
        run: cd frontend && npm run build

  # ─────────────────────────────────────────────────
  # Job: Docker Lint
  # ─────────────────────────────────────────────────
  docker-lint:
    name: Docker Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3013
        continue-on-error: true

  # ─────────────────────────────────────────────────
  # Job 8: Ruff Lint (uv)
  # ─────────────────────────────────────────────────
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv pip install --system ruff
      - run: ruff check src/ --output-format=github
      - run: ruff format src/ --check

  # ─────────────────────────────────────────────────
  # Job 9: Type Check (mypy)
  # ─────────────────────────────────────────────────
  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mypy types-passlib
      - run: pip install -e ".[dev]" || pip install sqlalchemy pydantic fastapi structlog
      - name: Run mypy
        run: mypy src/ --ignore-missing-imports --no-strict-optional --exclude 'alembic/' || true
        continue-on-error: true

  # ─────────────────────────────────────────────────
  # Job 10: Security Scan (bandit)
  # ─────────────────────────────────────────────────
  security:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install bandit[toml]
      - run: bandit -r src/ -ll --skip B101 -f json -o bandit-report.json || true
      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ─────────────────────────────────────────────────
  # Job 5: Summary Report
  # ─────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - lint-markdown
      - validate-docs-structure
      - validate-config-files
      - python-lint
      - python-test
      - frontend-build
      - docker-lint
      - lint
      - type-check
      - security
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate CI Summary
        run: |
          echo "## 📊 ServiceMatrix CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Markdown Lint | ${{ needs.lint-markdown.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docs Structure | ${{ needs.validate-docs-structure.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Config Validation | ${{ needs.validate-config-files.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Lint | ${{ needs.python-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Tests | ${{ needs.python-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.frontend-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Lint | ${{ needs.docker-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ruff Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check (mypy) | ${{ needs.type-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan (bandit) | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🕐 実行時刻: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
